name: Refresh KTA Dashboard

on:
  schedule:
    # Lunes a viernes 6am hora Colombia (UTC-5) = 11:00 UTC
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}   # ejecución manual desde la UI de GitHub

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # necesario para hacer commit + push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python refresh_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_nps_full.html refresh.log
          # Solo hace commit si hay cambios reales
          git diff --cached --quiet || git commit -m "chore: refresh dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
